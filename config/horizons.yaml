# Per-horizon ESN hyperparameters (paper Table 1)
# Train window / buffer in 10-min bar units
horizons:
  10min:
    horizon_steps: 1        # h in 10-min bars
    K: 100                  # reservoir size
    alpha: 0.9              # leak rate
    A_sparsity: 0.15        # recurrent matrix density
    rho: 0.4                # spectral radius
    C_sparsity: 0.95        # input matrix density
    gamma: 0.005            # input scaling
    train_window_bars: 3    # M = 30 min = 3 bars
    buffer_bars: 1          # tau_h = 10 min = 1 bar
    cv_lookback_days: 5     # 1 week
    cv_split: 0.7
    lambda_ridge: 1.0e-4    # Phase A scalar ridge (to be tuned by CV)

  30min:
    horizon_steps: 3
    K: 100
    alpha: 0.2
    A_sparsity: 0.15
    rho: 0.6
    C_sparsity: 0.55
    gamma: 0.005
    train_window_bars: 3    # M = 30 min = 3 bars
    buffer_bars: 3          # tau_h = 30 min = 3 bars
    cv_lookback_days: 5
    cv_split: 0.7
    lambda_ridge: 1.0e-4

  60min:
    horizon_steps: 6
    K: 100
    alpha: 0.0
    A_sparsity: 0.15
    rho: 0.6
    C_sparsity: 0.75
    gamma: 0.005
    train_window_bars: 6    # M = 1 hr = 6 bars
    buffer_bars: 6          # tau_h = 1 hr = 6 bars
    cv_lookback_days: 5
    cv_split: 0.7
    lambda_ridge: 1.0e-4

  2hr:
    horizon_steps: 12
    K: 100
    alpha: 0.0
    A_sparsity: 0.65
    rho: 0.6
    C_sparsity: 0.85
    gamma: 0.005
    train_window_bars: 6    # M = 1 hr = 6 bars
    buffer_bars: 12         # tau_h = 2 hr = 12 bars
    cv_lookback_days: 5
    cv_split: 0.7
    lambda_ridge: 1.0e-4

  EOD:
    horizon_steps: -1       # variable: bars until 16:00
    K: 100
    alpha: 0.0
    A_sparsity: 0.35
    rho: 0.0                # feedforward only
    C_sparsity: 0.25
    gamma: 0.015
    train_window_bars: 39   # M = 1 day = 39 bars
    buffer_bars: 39         # tau_h = 1 day = 39 bars
    cv_lookback_days: 5
    cv_split: 0.7
    lambda_ridge: 1.0e-4
